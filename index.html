<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>HTML - SCSS Assignment</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="dist/css/home-page.css" />
  </head>
  <body>
    <!-- Desktop tool bars -->
    <div class="l-toolbar d-none d-md-flex">
      <div
        class="m-toolbar-item is-clickable"
        onclick="handleAddFolderDesktop()"
      >
        <svg class="m-icon-custom">
          <use href="src/files/icons.svg#icon-new"></use>
        </svg>
        New
        <i class="fas fa-chevron-down ms-1 small"></i>
      </div>
      <input
        type="file"
        id="fileInput"
        style="display: none"
        accept=".xlsx,.xls,.doc,.docx,.pdf"
        onchange="onFileSelected(event)"
      />
      <div
        class="m-toolbar-item is-clickable"
        onclick="handleUploadFile()"
      >
        <svg class="m-icon-custom">
          <use href="src/files/icons.svg#icon-upload"></use>
        </svg>
        Upload
        <i class="fas fa-chevron-down ms-1 small"></i>
      </div>
      <div class="m-toolbar-item is-clickable">
        <svg class="m-icon-custom">
          <use href="src/files/icons.svg#icon-sync"></use>
        </svg>
        Sync
      </div>
      <div class="m-toolbar-item is-clickable">
        <svg class="m-icon-custom">
          <use href="src/files/icons.svg#icon-excel"></use>
        </svg>
        Export to Excel
      </div>
      <div class="m-toolbar-item is-clickable">
        <svg class="m-icon-custom">
          <use href="src/files/icons.svg#icon-flow"></use>
        </svg>
        Flow
        <i class="fas fa-chevron-down ms-1 small"></i>
      </div>
      <div class="m-toolbar-item is-clickable">
        <svg class="m-icon-custom">
          <use href="src/files/icons.svg#icon-more"></use>
        </svg>
      </div>
      <div
        id="back-btn"
        class="m-toolbar-item is-clickable d-none"
        onclick="goBack()"
      >
        <i class="fas fa-arrow-left"></i>
      </div>
    </div>
    <!-- Mobile tool bars and collapse menu -->
    <div class="l-header-mobile d-md-none">
      <!--display flex on md and above -->
      <!-- Hamburger button -->
      <div class="l-header-content">
        <button
          class="m-btn-hamburger"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mobileMenu"
        >
          <i class="fas fa-bars"></i>
        </button>
      </div>
      <!-- Collapse menu content -->
      <div class="collapse m-mobile-collapse" id="mobileMenu">
        <div class="m-mobile-list">
          <div class="m-mobile-item">
            <svg class="m-icon-custom">
              <use href="src/files/icons.svg#icon-new"></use>
            </svg>
            New
            <i class="fas fa-chevron-down small"></i>
          </div>
          <div class="m-mobile-item">
            <svg class="m-icon-custom">
              <use href="src/files/icons.svg#icon-upload"></use>
            </svg>
            Upload
            <i class="fas fa-chevron-down small"></i>
          </div>
          <div class="m-mobile-item">
            <svg class="m-icon-custom">
              <use href="src/files/icons.svg#icon-sync"></use>
            </svg>
            Sync
          </div>
          <div class="m-mobile-item">
            <svg class="m-icon-custom">
              <use href="src/files/icons.svg#icon-excel"></use>
            </svg>
            Export to Excel
          </div>
          <div class="m-mobile-item">
            <svg class="m-icon-custom">
              <use href="src/files/icons.svg#icon-flow"></use>
            </svg>
            Flow
          </div>
          <div class="m-mobile-item">
            <svg class="m-icon-custom">
              <use href="src/files/icons.svg#icon-more"></use>
            </svg>
          </div>
        </div>
      </div>
    </div>
    <!-- Main content container -->
    <div class="l-main-container container-fluid">
      <div class="d-flex align-items-center gap-2">
        <h1 id="folder-path-display" class="m-title-primary mb-0">
          Documents
        </h1>
      </div>
      <!-- Desktop table container (hidden on mobile) -->
      <div class="ms-5 d-none d-md-block">
        <!-- Header title -->
        <div class="m-table-row m-table-row--header">
          <div>
            <svg class="m-icon-custom">
              <use href="src/files/icons.svg#icon-folder"></use>
            </svg>
          </div>
          <div class="is-clickable">
            Name <i class="fas fa-chevron-down small"></i>
          </div>
          <div class="is-clickable">
            Modified <i class="fas fa-chevron-down small"></i>
          </div>
          <div class="is-clickable">
            Modified By <i class="fas fa-chevron-down small"></i>
          </div>
          <div class="is-clickable">
            <i class="fas fa-plus"></i> Add column
          </div>
        </div>
        <!-- Desktop row container (rows will be added dynamically via JavaScript) -->
        <div id="desktop-row-container"></div>
      </div>
      <!-- Mobile card container (hidden on desktop) -->
      <div class="d-md-none">
        <!-- Mobile card container (cards will be added dynamically via JavaScript) -->
        <div id="mobile-card-container"></div>
      </div>
    </div>
    <!-- File details modal -->
    <div id="fileModal" class="m-modal" style="display: none">
      <div class="m-modal-content">
        <div class="m-modal-header">
          <h3 id="modalFileName">File Details</h3>
          <button onclick="closeModal()" class="btn-close">
            &times;
          </button>
        </div>
        <div class="m-modal-body">
          <p>
            <strong>Extension:</strong>
            <span id="modalFileExtension"></span>
          </p>
          <p>
            <strong>Modified:</strong>
            <span id="modalFileModified"></span>
          </p>
          <p>
            <strong>Modified By:</strong>
            <span id="modalFileModifiedBy"></span>
          </p>
          <hr />
          <div class="d-flex gap-2 justify-content-end">
            <button id="modalDeleteBtn" class="btn btn-danger">
              <i class="fa-solid fa-trash"></i> Delete
            </button>
            <button id="modalDownloadBtn" class="btn btn-primary">
              <i class="fas fa-download me-2"></i> Download
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="dist/js/home-page.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
