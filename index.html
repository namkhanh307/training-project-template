<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>HTML - SCSS Assignment</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="dist/css/home-page.css" />
  </head>
  <body>
    <!-- Tool bars -->
    <nav class="navbar navbar-expand-md l-toolbar p-0">
      <div
        class="container-fluid px-0 d-flex justify-content-end justify-content-md-start"
      >
        <button
          class="navbar-toggler m-btn-hamburger d-md-none my-2 me-3"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#unifiedMenu"
        >
          <i class="fas fa-bars"></i>
        </button>

        <div class="collapse navbar-collapse" id="unifiedMenu">
          <div
            class="d-flex flex-column flex-md-row gap-0 gap-md-4 w-100 m-toolbar-nav"
          >
            <div
              class="m-toolbar-item is-clickable position-relative"
              data-action="toggle-new-menu"
            >
              <svg class="m-icon-custom">
                <use href="src/files/icons.svg#icon-new"></use>
              </svg>
              New <i class="fas fa-chevron-down ms-1 small"></i>

              <div
                id="newOptionsMenu"
                class="new-options-menu dropdown-menu shadow-sm"
              >
                <div
                  class="dropdown-item is-clickable py-2"
                  data-action="trigger-new-folder"
                >
                  <i class="fas fa-folder text-warning me-2"></i>
                  Folder
                </div>
                <div
                  class="dropdown-item is-clickable py-2"
                  data-action="trigger-new-file"
                >
                  <i class="fas fa-file-alt text-primary me-2"></i>
                  File
                </div>
              </div>
            </div>

            <input
              type="file"
              id="fileInput"
              style="display: none"
              accept=".xlsx,.xls,.doc,.docx,.pdf"
              multiple
            />

            <div
              class="m-toolbar-item is-clickable"
              data-action="upload-file"
            >
              <svg class="m-icon-custom">
                <use href="src/files/icons.svg#icon-upload"></use>
              </svg>
              Upload
            </div>
            <div
              class="m-toolbar-item is-clickable"
              data-action="sync"
            >
              <svg class="m-icon-custom">
                <use href="src/files/icons.svg#icon-sync"></use>
              </svg>
              Sync
            </div>
            <div
              class="m-toolbar-item is-clickable"
              data-action="export"
            >
              <svg class="m-icon-custom">
                <use href="src/files/icons.svg#icon-excel"></use>
              </svg>
              Export to Excel
            </div>
            <div
              class="m-toolbar-item is-clickable"
              data-action="flow"
            >
              <svg class="m-icon-custom">
                <use href="src/files/icons.svg#icon-flow"></use>
              </svg>
              Flow
            </div>
            <div
              class="m-toolbar-item is-clickable"
              data-action="more"
            >
              <svg class="m-icon-custom">
                <use href="src/files/icons.svg#icon-more"></use>
              </svg>
            </div>
          </div>
        </div>
      </div>
    </nav>
    <!-- Table & card responsive -->
    <div class="l-main-container container-fluid">
      <div class="d-flex align-items-center gap-2">
        <h1 id="breadcrumb" class="m-title-primary mb-0"></h1>
      </div>

      <div class="m-data-grid mt-3">
        <div class="m-list-row m-list-header d-none d-md-grid">
          <div>
            <svg class="m-icon-custom">
              <use href="src/files/icons.svg#icon-folder"></use>
            </svg>
          </div>
          <div class="is-clickable">
            Name <i class="fas fa-chevron-down small"></i>
          </div>
          <div class="is-clickable">
            Modified <i class="fas fa-chevron-down small"></i>
          </div>
          <div class="is-clickable">
            Modified By <i class="fas fa-chevron-down small"></i>
          </div>
          <div class="is-clickable d-flex justify-content-center">
            Action
          </div>
          <div class="is-clickable">
            <i class="fas fa-plus"></i> Add column
          </div>
        </div>

        <div id="unified-row-container"></div>
      </div>
    </div>
    <div
      id="dynamic-modal"
      class="m-modal"
      style="display: none"
    ></div>
    <script src="dist/js/home-page.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
