<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Responsive SharePoint View</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="dist/css/home-page.css" />
  </head>
  <body>
    <div class="sp-toolbar d-none d-md-flex">
      <div class="toolbar-item">
        <i class="fas fa-plus"></i> New
        <i class="fas fa-chevron-down ms-1 small"></i>
      </div>
      <div class="toolbar-item">
        <i class="fas fa-arrow-up"></i> Upload
        <i class="fas fa-chevron-down ms-1 small"></i>
      </div>
      <div class="toolbar-item">
        <i class="fas fa-sync sync-icon"></i> Sync
      </div>
      <div class="toolbar-item">
        <i class="fas fa-file-excel excel-icon"></i> Export to Excel
      </div>
      <div class="toolbar-item">
        <i class="fas fa-share-nodes flow-icon"></i> Flow
        <i class="fas fa-chevron-down ms-1 small"></i>
      </div>
      <div class="toolbar-item ms-auto">
        <i class="fas fa-ellipsis"></i>
      </div>
    </div>

    <div class="mobile-header d-md-none">
      <button
        class="hamburger-btn"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mobileMenu"
      >
        <i class="fas fa-bars"></i>
      </button>

      <div class="collapse mobile-toolbar-collapse" id="mobileMenu">
        <div class="mobile-toolbar-list">
          <div class="mobile-item">
            <i class="fas fa-plus icon-new"></i> New
            <i class="fas fa-chevron-down ms-auto small"></i>
          </div>
          <div class="mobile-item">
            <i class="fas fa-arrow-up icon-upload"></i> Upload
            <i class="fas fa-chevron-down ms-auto small"></i>
          </div>
          <div class="mobile-item">
            <i class="fas fa-sync sync-icon"></i> Sync
          </div>
          <div class="mobile-item active">
            <i class="fas fa-file-excel excel-icon"></i> Export to
            Excel
          </div>
          <div class="mobile-item">
            <i class="fas fa-share-nodes flow-icon"></i> Flow
          </div>
          <div class="mobile-item">
            <i class="fas fa-ellipsis"></i>
          </div>
        </div>
      </div>
    </div>

    <div class="container-fluid px-md-4">
      <h1 class="page-title">Documents</h1>

      <div class="d-none d-md-block">
        <div class="sp-table-header">
          <div class="header-cell"><i class="far fa-file"></i></div>
          <div class="header-cell">
            Name <i class="fas fa-chevron-down small"></i>
          </div>
          <div class="header-cell">
            Modified <i class="fas fa-chevron-down small"></i>
          </div>
          <div class="header-cell">
            Modified By <i class="fas fa-chevron-down small"></i>
          </div>
          <div class="header-cell text-primary">
            <i class="fas fa-plus"></i> Add column
          </div>
        </div>

        <div class="sp-row">
          <div class="file-icon">
            <i class="fas fa-folder folder-icon"></i>
          </div>
          <div class="name-cell">CAS</div>
          <div class="modified-cell">April 30</div>
          <div class="modified-by-cell">Megan Bowen</div>
          <div></div>
        </div>
      </div>

      <div class="d-md-none">
        <div class="doc-card">
          <div class="doc-row header-row">
            <div class="doc-label">File Type</div>
            <div class="doc-value">
              <div class="icon-container">
                <i class="fas fa-folder folder-icon"></i>
              </div>
            </div>
          </div>
          <div class="doc-row">
            <div class="doc-label">Name</div>
            <div class="doc-value">CAS</div>
          </div>
          <div class="doc-row">
            <div class="doc-label">Modified</div>
            <div class="doc-value">April 30</div>
          </div>
          <div class="doc-row">
            <div class="doc-label">Modified By</div>
            <div class="doc-value">Megan Bowen</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
